<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>J&E Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./assets/css/styles.css" id="stylesheet" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html">
          <span class="brand-name">J<span>&amp;</span>E Mobile</span>
          <span class="brand-sub">Admin Dashboard</span>
        </a>

        <div class="nav-actions" style="display:flex;gap:10px;align-items:center;">
          <a class="btn" href="img.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;" title="Image upload tool">📷 Images</a>
        </div>

        <div id="login-section" class="auth-bar header-auth">
          <form id="login-form" class="auth-form">
            <span class="auth-label" id="authLabel">Not signed in</span>
            <input type="email" id="username" placeholder="Email" required autocomplete="email" />
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
            <button type="submit" class="btn-primary">Sign In</button>
          </form>
          <button id="logout" style="display: none">Logout</button>
        </div>
      </div>

      <!-- Mobile menu -->
      <div id="mobile-menu" class="mobile-menu" aria-hidden="true"></div>
    </header>

    <div class="admin-dashboard">
      <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <h1>J&E Dispatch</h1>
            <div class="muted" id="adminStatus">Not logged in</div>

            <div id="adminPanel" class="hidden">
              <div class="search-row">
                <input
                  type="search"
                  id="searchInput"
                  placeholder="Search requests..."
                />

                <select id="statusFilter">
                  <option value="all">All Statuses</option>
                  <option value="new">New</option>
                  <option value="contacted">Contacted</option>
                  <option value="scheduled">Scheduled</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
            </div>
          </div>

          <div id="requests" class="requests"></div>
        </aside>

        <!-- WORKSPACE -->
        <section class="workspace">
          <div class="workspace-top">
            <div>
              <strong>Workspace</strong>
              <div class="muted">
                Open your internal apps directly in the dashboard.
              </div>
            </div>

            <div class="workspace-buttons">
              <button
                class="btn"
                data-app="https://luissolutions.github.io/apps/online/onlinejob.html"
              >
                Open Tasker
              </button>

              <button
                class="btn"
                data-app="https://luissolutions.github.io/apps/online/onlineinvoice.html"
              >
                Open Invoice
              </button>

              <button class="btn" id="clearFrameBtn">Close App</button>
            </div>
          </div>

          <div id="workspaceArea">
            <div class="empty-state">
              Select an app to open it in the workspace.
            </div>
          </div>
        </section>
      </div>
    </div>

    <script type="module">
      import {
        auth,
        database,
        ref,
        set,
        get,
        push,
        remove,
        onValue,
        signOut,
        onAuthStateChanged,
        signInWithEmailAndPassword,
      } from "./assets/js/firebase-init.js";

      const loginForm  = document.getElementById("login-form");
      const logoutBtn  = document.getElementById("logout");

      loginForm?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("username").value.trim();
        const pass  = document.getElementById("password").value;
        try {
          await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
          alert("Sign-in failed: " + err.message);
        }
      });

      logoutBtn?.addEventListener("click", () => signOut(auth));

      onAuthStateChanged(auth, (user) => {
        if (loginForm)  loginForm.style.display  = user ? "none"  : "";
        if (logoutBtn)  logoutBtn.style.display   = user ? ""     : "none";
      });

      const adminPanel = document.getElementById("adminPanel");
      const adminStatus = document.getElementById("adminStatus");

      const requestsEl = document.getElementById("requests");
      const searchInput = document.getElementById("searchInput");
      const statusFilter = document.getElementById("statusFilter");

      const workspaceArea = document.getElementById("workspaceArea");
      const clearFrameBtn = document.getElementById("clearFrameBtn");

      let allTickets = {};
      let isAdmin = false;
      let currentUser = null;

      onAuthStateChanged(auth, async (user) => {
        currentUser = user || null;
        if (!user) {
          isAdmin = false;

          adminStatus.textContent = "Not logged in";

          adminPanel.classList.add("hidden");

          requestsEl.innerHTML = `
            <div class="request-card">
                <div class="request-body">
                <div class="muted">
                    Please sign in using the header above.
                </div>
                </div>
            </div>
            `;

          return;
        }

        try {
          const adminSnap = await get(ref(database, `${user.uid}/info/role`));

          isAdmin = adminSnap.exists() && adminSnap.val() === "admin";

          if (!isAdmin) {
            adminStatus.textContent = `Logged in as ${user.email} (Not authorized)`;

            adminPanel.classList.add("hidden");

            requestsEl.innerHTML = `
        <div class="request-card">
          <div class="request-body">
            <div class="muted">
              Your account is not authorized as an admin.
            </div>
          </div>
        </div>
      `;

            return;
          }

          adminStatus.textContent = `Logged in as ${user.email}`;

          adminPanel.classList.remove("hidden");

          loadTickets();
        } catch (error) {
          console.error(error);

          adminStatus.textContent = "Failed to verify admin access";
        }
      });

      function loadTickets() {
        onValue(ref(database, "public/serviceTickets"), (snapshot) => {
          allTickets = snapshot.val() || {};

          renderTickets();
        });
      }

      searchInput.addEventListener("input", renderTickets);
      statusFilter.addEventListener("change", renderTickets);

      function renderTickets() {
        const query = searchInput.value.trim().toLowerCase();
        const status = statusFilter.value;

        requestsEl.innerHTML = "";

        const tickets = Object.entries(allTickets)
          .map(([id, ticket]) => ({ id, ...ticket }))
          .filter((ticket) => {
            const searchBlob = [
              ticket.name,
              ticket.phone,
              ticket.service,
              ticket.notes,
              ticket.city,
              ticket.vehicle,
            ]
              .join(" ")
              .toLowerCase();

            const matchesSearch = !query || searchBlob.includes(query);
            const matchesStatus = status === "all" || ticket.status === status;

            return matchesSearch && matchesStatus;
          })
          .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        if (!tickets.length) {
          requestsEl.innerHTML = `
          <div class="request-card">
            <div class="request-body">
              <div class="muted">No requests found.</div>
            </div>
          </div>
        `;

          return;
        }

        tickets.forEach((ticket) => {
          const card = document.createElement("div");
          card.className = "request-card";

          card.innerHTML = `

          <div class="request-top">

            <div class="request-title">
              <strong>${escapeHtml(ticket.name || "Unknown")}</strong>
              <div class="muted">
                ${escapeHtml(ticket.ticketNumber || ticket.id)}
              </div>
              <div class="muted">
                ${new Date(ticket.timestamp || Date.now()).toLocaleString()}
              </div>
            </div>

            <div class="status status-${ticket.status || "new"}">
              ${ticket.status || "new"}
            </div>

          </div>

          <div class="request-body">

            <div class="request-grid">

              <div class="request-field">
                <span>Phone</span>
                ${escapeHtml(ticket.phone || "-")}
              </div>

              <div class="request-field">
                <span>Service</span>
                ${escapeHtml(ticket.service || "-")}
              </div>

              <div class="request-field">
                <span>City</span>
                ${escapeHtml(ticket.city || "-")}
              </div>

              <div class="request-field">
                <span>Vehicle</span>
                ${escapeHtml(ticket.vehicle || "-")}
              </div>

            </div>

            <div class="notes">${escapeHtml(ticket.notes || "No notes")}</div>

            <div class="request-actions">

              <a class="btn" href="tel:${ticket.phone || ""}">
                Call
              </a>

              <a class="btn" href="sms:${ticket.phone || ""}">
                Text
              </a>

              <button class="btn" data-status="contacted">
                Contacted
              </button>

              <button class="btn" data-status="scheduled">
                Scheduled
              </button>

              <button class="btn" data-status="completed">
                Completed
              </button>

              <button class="btn" data-convert="true">
                → Job
              </button>

              <button class="btn" data-invoice="true">
                Open Invoice
              </button>

              <button class="btn btn-danger" data-delete="true">
                Delete
              </button>

            </div>

          </div>
        `;

          card.querySelectorAll("[data-status]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const newStatus = btn.dataset.status;

              try {
                await set(ref(database, `public/serviceTickets/${ticket.id}`), {
                  ...ticket,
                  status: newStatus,
                  updatedAt: Date.now(),
                });
              } catch (error) {
                console.error(error);
                alert("Failed to update status.");
              }
            });
          });

          card.querySelector("[data-convert]").addEventListener("click", async () => {
            if (!currentUser) { alert("Sign in first."); return; }
            const newId = Date.now().toString();
            const noteParts = [];
            if (ticket.service) noteParts.push(`Service: ${ticket.service}`);
            if (ticket.vehicle) noteParts.push(`Vehicle: ${ticket.vehicle}`);
            if (ticket.notes)   noteParts.push(ticket.notes);
            const task = {
              id: newId,
              customerName:    ticket.name    || '',
              project:         ticket.ticketNumber || ticket.id || '',
              customerAddress: ticket.city    || '',
              customerPhone:   ticket.phone   || '',
              customerEmail:   '',
              notes:           noteParts.join('\n'),
              startOdometer:   '',
              endOdometer:     null,
              location:        null,
              startTime:       null,
              endTime:         null,
              segments:        [],
              fromTicketId:    ticket.id,
            };
            try {
              await set(ref(database, `${currentUser.uid}/tasks/${newId}`), task);
              if (!['scheduled','completed'].includes(ticket.status)) {
                await set(ref(database, `public/serviceTickets/${ticket.id}`), { ...ticket, status: 'scheduled', updatedAt: Date.now() });
              }
              openIframe(`../../apps/online/onlinejob.html?task=${newId}`);
            } catch (err) {
              alert("Failed to create job: " + err.message);
            }
          });

          card.querySelector("[data-invoice]").addEventListener("click", async () => {
            if (!currentUser) { alert("Sign in first."); return; }
            // 1. Look for an existing task that was created from this ticket
            //    (via the "Convert to Job" flow -- it stamps fromTicketId).
            let taskId = null;
            try {
              const tasksSnap = await get(ref(database, `${currentUser.uid}/tasks`));
              const tasks = tasksSnap.val() || {};
              const hit = Object.entries(tasks).find(([_, t]) => t && t.fromTicketId === ticket.id);
              if (hit) taskId = hit[0];
            } catch (e) { /* fall through to create */ }

            // 2. No existing task -- create a lightweight one (no time tracking,
            //    just customer info) so onlineinvoice has something to import.
            if (!taskId) {
              taskId = Date.now().toString();
              const noteParts = [];
              if (ticket.service) noteParts.push(`Service: ${ticket.service}`);
              if (ticket.vehicle) noteParts.push(`Vehicle: ${ticket.vehicle}`);
              if (ticket.notes)   noteParts.push(ticket.notes);
              const task = {
                id: taskId,
                customerName:    ticket.name    || '',
                project:         ticket.ticketNumber || ticket.id || '',
                customerAddress: ticket.city    || '',
                customerPhone:   ticket.phone   || '',
                customerEmail:   ticket.email   || '',
                notes:           noteParts.join('\n'),
                segments:        [],
                fromTicketId:    ticket.id,
                createdFrom:     'ticket-invoice-direct',
              };
              try {
                await set(ref(database, `${currentUser.uid}/tasks/${taskId}`), task);
              } catch (err) {
                alert("Failed to prep invoice: " + err.message);
                return;
              }
            }

            // 3. Open invoice with the task pre-loaded via URL param.
            openIframe(`../../apps/online/onlineinvoice.html?task=${encodeURIComponent(taskId)}`);
          });

          card.querySelector("[data-delete]").addEventListener("click", async () => {
            if (!confirm(`Delete ticket ${ticket.ticketNumber || ticket.id}? This cannot be undone.`)) return;
            try {
              await remove(ref(database, `public/serviceTickets/${ticket.id}`));
            } catch (err) {
              alert("Delete failed: " + err.message);
            }
          });

          requestsEl.appendChild(card);
        });
      }

      document.querySelectorAll("[data-app]").forEach((btn) => {
        btn.addEventListener("click", () => {
          openIframe(btn.dataset.app);
        });
      });

clearFrameBtn.addEventListener("click", () => {
  // Restore the dashboard layout
  document.body.classList.remove("workspace-fullscreen");
  document.querySelector(".sidebar").style.display = "";
  document.querySelector(".workspace-top strong").style.display = "";
  document.querySelector(".workspace-top .muted").style.display = "";

  // Show all buttons again
  document.querySelectorAll(".workspace-buttons .btn").forEach((btn) => {
    btn.style.display = "";
  });

  // Clear iframe
  workspaceArea.innerHTML = `
    <div class="empty-state">
      Select an app to open it in the workspace.
    </div>
  `;
});

function openIframe(url) {
  // Collapse the sidebar column so the iframe spans the full viewport width.
  document.body.classList.add("workspace-fullscreen");
  document.querySelector(".sidebar").style.display = "none";
  document.querySelector(".workspace-top strong").style.display = "none";
  document.querySelector(".workspace-top .muted").style.display = "none";

  // Hide all buttons except Close App
  document.querySelectorAll(".workspace-buttons .btn").forEach((btn) => {
    if (btn.id !== "clearFrameBtn") {
      btn.style.display = "none";
    }
  });

  // Fullscreen iframe
  workspaceArea.innerHTML = `
    <iframe src="${url}"></iframe>
  `;
}

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
