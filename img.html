<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JEM Image Upload Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
  <body>
    <!-- Site header -- matches dash.html chrome -->
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./index.html">
          <span class="brand-name">J<span>&amp;</span>E Mobile</span>
          <span class="brand-sub">Image Upload Tool</span>
        </a>
        <div class="nav-actions">
          <a class="btn" href="dash.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;" title="Job dispatch dashboard">📋 Dashboard</a>
        </div>
        <div class="auth-bar header-auth">
          <span class="auth-label" id="authLabel">Not signed in</span>
          <input type="email" id="emailIn" placeholder="Email" autocomplete="email" />
          <input type="password" id="passIn" placeholder="Password" autocomplete="current-password" />
          <button id="loginBtn" class="btn-primary">Sign In</button>
        </div>
      </div>
    </header>

    <div class="container">
      <h1>JEM Image Upload Tool</h1>
      <p class="subtitle">Resize, rename, and upload images to Firebase. They appear on the site instantly.</p>

      <!-- Settings -->
      <div class="panel">
        <div class="grid">
          <label>
            Category
            <select id="prefix">
              <option value="d">d — Detailing</option>
              <option value="m">m — Mechanic</option>
              <option value="c">c — Decals</option>
              <option value="p">p — Pressure Wash</option>
            </select>
          </label>
          <label>
            Starting Number
            <input type="number" id="startNumber" value="1" min="0" />
          </label>
          <label>
            Resize Width (px)
            <input type="number" id="resizeWidth" value="1600" min="100" />
          </label>
          <label>
            JPEG Quality (0–1)
            <input type="number" id="quality" value="0.85" min="0.1" max="1" step="0.05" />
          </label>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="keepOriginalSize" />
          <label for="keepOriginalSize">Do not resize</label>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="beforeAfterMode" />
          <label for="beforeAfterMode">
            Before / After mode
            <span class="mode-hint">odd file → d001<strong>b</strong> (before) · even file → d001<strong>a</strong> (after)</span>
          </label>
        </div>

        <div class="dropzone" id="dropzone">
          <p><strong>Drag &amp; Drop Images Here</strong></p>
          <p class="muted">or click to select</p>
          <input type="file" id="imageInput" multiple accept="image/*" />
        </div>

        <div class="actions">
          <button id="processBtn">Process &amp; Preview</button>
          <button id="uploadBtn" class="btn-primary" disabled>Upload to Firebase</button>
          <button id="downloadAllBtn" class="btn-secondary" disabled>Download ZIP</button>
        </div>

        <div class="log" id="log"></div>
      </div>

      <!-- Preview -->
      <div class="panel">
        <h2>Preview</h2>
        <div id="previewGrid" class="preview-grid"></div>
      </div>

      <!-- Uploaded -->
      <div class="panel">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
          <h2 style="margin:0;">Uploaded to Firebase</h2>
          <button id="refreshStorageBtn" class="btn-secondary" style="padding:8px 16px;">Refresh</button>
          <span id="storageStatus" style="color:var(--muted);font-size:.85rem;"></span>
        </div>
        <div id="storageGrid"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script type="module">
      import {
        storage, storageRef, uploadBytesResumable, getDownloadURL, listAll, deleteObject,
        auth, onAuthStateChanged, signInWithEmailAndPassword, signOut
      } from "./assets/js/firebase-init.js";

      const authLabel  = document.getElementById("authLabel");
      const loginBtn   = document.getElementById("loginBtn");
      const emailIn    = document.getElementById("emailIn");
      const passIn     = document.getElementById("passIn");
      const imageInput = document.getElementById("imageInput");
      const processBtn = document.getElementById("processBtn");
      const uploadBtn  = document.getElementById("uploadBtn");
      const downloadAllBtn = document.getElementById("downloadAllBtn");
      const previewGrid = document.getElementById("previewGrid");
      const logEl      = document.getElementById("log");
      const dropzone   = document.getElementById("dropzone");

      let selectedFiles  = [];
      let processedFiles = [];
      let currentUser    = null;

      /* ── auth ── */
      onAuthStateChanged(auth, user => {
        currentUser = user;
        if (user) {
          authLabel.textContent = "Signed in: " + user.email;
          emailIn.style.display = "none";
          passIn.style.display  = "none";
          loginBtn.textContent  = "Sign Out";
        } else {
          authLabel.textContent = "Not signed in — sign in to upload";
          emailIn.style.display = "";
          passIn.style.display  = "";
          loginBtn.textContent  = "Sign In";
        }
      });

      loginBtn.addEventListener("click", async () => {
        if (currentUser) {
          await signOut(auth);
        } else {
          try {
            await signInWithEmailAndPassword(auth, emailIn.value, passIn.value);
          } catch {
            alert("Login failed. Check email and password.");
          }
        }
      });

      /* ── file selection ── */
      imageInput.addEventListener("change", e => {
        selectedFiles = [...e.target.files];
        logEl.textContent = selectedFiles.length + " image(s) selected.";
      });

      dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("dragover"); });
      dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
      dropzone.addEventListener("drop", e => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        selectedFiles = [...e.dataTransfer.files].filter(f => f.type.startsWith("image/"));
        logEl.textContent = selectedFiles.length + " image(s) selected.";
      });

      /* ── filename builder ── */
      function buildFilename(prefix, startNum, fileIndex, beforeAfterMode) {
        if (beforeAfterMode) {
          const pairNum = startNum + Math.floor(fileIndex / 2);
          const suffix  = fileIndex % 2 === 0 ? "b" : "a";
          return prefix + String(pairNum).padStart(3, "0") + suffix + ".jpg";
        }
        return prefix + String(startNum + fileIndex).padStart(3, "0") + ".jpg";
      }

      /* ── resize ── */
      function resizeImage(file, maxWidth, quality, keepOriginalSize) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            let w = img.width, h = img.height;
            if (!keepOriginalSize && w > maxWidth) {
              h = Math.round(h * (maxWidth / w));
              w = maxWidth;
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            canvas.toBlob(resolve, "image/jpeg", quality);
          };
          img.src = URL.createObjectURL(file);
        });
      }

      function formatBytes(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
        return (b / 1048576).toFixed(2) + " MB";
      }

      /* ── process ── */
      processBtn.addEventListener("click", async () => {
        if (!selectedFiles.length) { alert("Select images first."); return; }

        processBtn.disabled = true;
        processBtn.textContent = "Processing…";
        previewGrid.innerHTML = "";
        processedFiles = [];

        const prefix          = document.getElementById("prefix").value;
        const startNum        = Number(document.getElementById("startNumber").value) || 1;
        const resizeWidth     = Number(document.getElementById("resizeWidth").value) || 1600;
        const quality         = Number(document.getElementById("quality").value) || 0.85;
        const keepOriginalSize = document.getElementById("keepOriginalSize").checked;
        const beforeAfterMode = document.getElementById("beforeAfterMode").checked;

        for (let i = 0; i < selectedFiles.length; i++) {
          const filename = buildFilename(prefix, startNum, i, beforeAfterMode);
          const blob     = await resizeImage(selectedFiles[i], resizeWidth, quality, keepOriginalSize);
          const objUrl   = URL.createObjectURL(blob);
          processedFiles.push({ filename, blob });

          const card = document.createElement("div");
          card.className = "preview-card";
          card.innerHTML =
            '<img src="' + objUrl + '" alt="' + filename + '">' +
            '<div class="preview-info">' +
              '<div class="filename">' + filename + '</div>' +
              '<div class="muted">' + formatBytes(blob.size) + '</div>' +
              '<div class="upload-status" id="status-' + i + '"></div>' +
              '<div class="progress-bar"><div class="progress-fill" id="prog-' + i + '"></div></div>' +
            '</div>';
          previewGrid.appendChild(card);
        }

        logEl.textContent = "Processed " + processedFiles.length + " image(s). Click Upload to push to Firebase.";
        processBtn.disabled = false;
        processBtn.textContent = "Process & Preview";
        uploadBtn.disabled = false;
        downloadAllBtn.disabled = false;
      });

      /* ── upload ── */
      uploadBtn.addEventListener("click", async () => {
        if (!processedFiles.length) return;
        if (!currentUser) { alert("Sign in before uploading."); return; }

        uploadBtn.disabled = true;
        uploadBtn.textContent = "Uploading…";
        let successCount = 0;

        await Promise.all(processedFiles.map((f, i) => new Promise(resolve => {
          const path  = "public/jeb/images/" + f.filename;
          const ref   = storageRef(storage, path);
          const task  = uploadBytesResumable(ref, f.blob, { contentType: "image/jpeg" });
          const statEl = document.getElementById("status-" + i);
          const progEl = document.getElementById("prog-" + i);

          task.on("state_changed",
            snap => {
              const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
              if (progEl) progEl.style.width = pct + "%";
            },
            err => {
              if (statEl) { statEl.textContent = "Failed: " + err.code; statEl.className = "upload-status err"; }
              resolve();
            },
            async () => {
              if (statEl) { statEl.textContent = "✓ Uploaded"; statEl.className = "upload-status ok"; }
              successCount++;
              resolve();
            }
          );
        })));

        logEl.textContent = "Uploaded " + successCount + " / " + processedFiles.length + " image(s). Slideshow will reflect changes on next load.";
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload to Firebase";
      });

      /* ── download zip ── */
      downloadAllBtn.addEventListener("click", async () => {
        if (!processedFiles.length) return;
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.filename, f.blob));
        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "jem-gallery-images.zip";
        a.click();
      });
    </script>
    <script type="module">
      import {
        storage, storageRef, listAll, getDownloadURL, deleteObject,
        auth, onAuthStateChanged
      } from "./assets/js/firebase-init.js";

      const CATS = [
        { prefix: "d", label: "d — Detailing" },
        { prefix: "m", label: "m — Mechanic" },
        { prefix: "c", label: "c — Decals" },
        { prefix: "p", label: "p — Pressure Wash" },
      ];

      const storageGrid   = document.getElementById("storageGrid");
      const storageStatus = document.getElementById("storageStatus");
      const refreshBtn    = document.getElementById("refreshStorageBtn");

      let canDelete = false;
      onAuthStateChanged(auth, u => { canDelete = !!u; });

      function sortItems(items) {
        return [...items].sort((a, b) => {
          const parse = name => {
            const m = name.match(/^[a-z](\d+)([ba]?)\.jpg$/i);
            if (!m) return [0, 0];
            return [parseInt(m[1]), m[2] === "b" ? 0 : m[2] === "a" ? 1 : 0];
          };
          const [an, aw] = parse(a.name);
          const [bn, bw] = parse(b.name);
          return an !== bn ? an - bn : aw - bw;
        });
      }

      async function loadStorageView() {
        storageGrid.innerHTML = "";
        storageStatus.textContent = "Loading…";
        refreshBtn.disabled = true;

        try {
          const folder = storageRef(storage, "public/jeb/images/");
          const result = await listAll(folder);
          const allItems = result.items;

          let total = 0;

          for (const cat of CATS) {
            const items = sortItems(allItems.filter(i => i.name.startsWith(cat.prefix)));
            if (!items.length) continue;
            total += items.length;

            const section = document.createElement("div");
            section.className = "cat-section";
            section.innerHTML = `<div class="cat-label">${cat.label} — ${items.length} photo${items.length !== 1 ? "s" : ""}</div>`;

            const grid = document.createElement("div");
            grid.className = "storage-grid";

            for (const item of items) {
              const card = document.createElement("div");
              card.className = "storage-card";
              card.id = "sc-" + item.name;

              const img = document.createElement("img");
              img.alt = item.name;
              img.loading = "lazy";
              img.src = "";

              const name = document.createElement("div");
              name.className = "card-name";
              name.textContent = item.name;

              const del = document.createElement("button");
              del.className = "card-del";
              del.textContent = "Delete";
              del.addEventListener("click", async () => {
                if (!canDelete) { alert("Sign in to delete."); return; }
                if (!confirm(`Delete ${item.name}?`)) return;
                del.disabled = true;
                del.textContent = "Deleting…";
                try {
                  await deleteObject(item);
                  card.remove();
                } catch (e) {
                  del.disabled = false;
                  del.textContent = "Delete";
                  alert("Delete failed: " + e.message);
                }
              });

              card.append(img, name, del);
              grid.appendChild(card);

              getDownloadURL(item).then(url => { img.src = url; }).catch(() => { img.alt = item.name + " (load failed)"; });
            }

            section.appendChild(grid);
            storageGrid.appendChild(section);
          }

          storageStatus.textContent = total ? `${total} photo${total !== 1 ? "s" : ""} total` : "No photos found.";
        } catch (err) {
          storageStatus.textContent = "Error: " + err.message;
        }

        refreshBtn.disabled = false;
      }

      refreshBtn.addEventListener("click", loadStorageView);
      loadStorageView();
    </script>
  </body>
</html>
